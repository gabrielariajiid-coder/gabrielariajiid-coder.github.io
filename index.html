<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gabriel Ariaji</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500&display=swap');

  :root{
    --bg:#14171a;
    --panel:#1c2124;
    --line:#343b3f;
    --text:#e9edee;
    --muted:#8b979c;
    --amber:#ffb020;
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 20% 15%, rgba(255,176,32,0.05), transparent 40%),
      var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  .badge{
    position:relative;
    width:100%;
    max-width:380px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,0.45);
  }

  .scanline{
    position:absolute;
    left:0; right:0; top:0;
    height:2px;
    background:linear-gradient(90deg, transparent, var(--amber), transparent);
    box-shadow:0 0 12px 2px var(--amber);
    animation:scan 2.6s ease-in-out infinite;
  }
  @keyframes scan{
    0%{top:0; opacity:0;}
    8%{opacity:1;}
    92%{opacity:1;}
    100%{top:100%; opacity:0;}
  }

  .badge-top{
    padding:28px 26px 20px;
    border-bottom:1px dashed var(--line);
  }

  .chip{
    width:34px; height:26px;
    border-radius:5px;
    background:repeating-linear-gradient(90deg, #3a4448 0 4px, #2a3134 4px 8px);
    border:1px solid var(--line);
    margin-bottom:16px;
  }

  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:2px;
    color:var(--amber);
    text-transform:uppercase;
    margin:0 0 6px;
  }

  h1{
    font-family:'IBM Plex Mono',monospace;
    font-size:24px;
    font-weight:600;
    margin:0 0 4px;
    letter-spacing:0.5px;
  }

  .role{
    font-size:13px;
    color:var(--muted);
    margin:0;
  }

  .links{
    padding:20px 22px 26px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .link{
    display:flex;
    align-items:center;
    gap:12px;
    padding:14px 16px;
    background:#20262a;
    border:1px solid var(--line);
    border-radius:9px;
    text-decoration:none;
    color:var(--text);
    font-size:14px;
    transition:transform .15s ease, border-color .15s ease, background .15s ease;
  }
  .link:hover{
    transform:translateX(3px);
    border-color:var(--amber);
    background:#242b2f;
  }
  .link .tag{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--muted);
    margin-left:auto;
  }
  .link .icon{
    width:18px; height:18px;
    flex-shrink:0;
    color:var(--amber);
  }
  .link .label{font-weight:500;}
  .link .sub{
    display:block;
    font-size:11.5px;
    color:var(--muted);
    font-weight:400;
    margin-top:2px;
  }

  footer{
    text-align:center;
    font-family:'IBM Plex Mono',monospace;
    font-size:10.5px;
    color:var(--muted);
    padding-bottom:22px;
    letter-spacing:1px;
  }
</style>
</head>
<body>

  <div class="badge">
    <div class="scanline"></div>
    <div class="badge-top">
      <div class="chip"></div>
      <p class="eyebrow">Access ID · Verified</p>
      <h1>Gabriel Ariaji</h1>
      <p class="role">Developer &mdash; embedded &amp; systems projects</p>
    </div>

    <div class="links">

        <span>
          <span class="label">Sistem Monitoring Kunjungan RFID</span>
          <span class="sub">github.com/Mazmurgthski</span>
        </span>
        <span class="tag">repo</span>
      </a>

        <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.2c3.2 0 3.6 0 4.9.1 1.2.1 2 .3 2.4.5.6.2 1 .5 1.4 1 .4.4.7.8 1 1.4.2.5.4 1.2.5 2.4.1 1.3.1 1.7.1 4.9s0 3.6-.1 4.9c-.1 1.2-.3 2-.5 2.4-.2.6-.5 1-1 1.4-.4.4-.8.7-1.4 1-.5.2-1.2.4-2.4.5-1.3.1-1.7.1-4.9.1s-3.6 0-4.9-.1c-1.2-.1-2-.3-2.4-.5-.6-.2-1-.5-1.4-1-.4-.4-.7-.8-1-1.4-.2-.5-.4-1.2-.5-2.4-.1-1.3-.1-1.7-.1-4.9s0-3.6.1-4.9c.1-1.2.3-2 .5-2.4.2-.6.5-1 1-1.4.4-.4.8-.7 1.4-1 .5-.2 1.2-.4 2.4-.5C8.4 2.2 8.8 2.2 12 2.2zm0 1.8c-3.1 0-3.5 0-4.8.1-1 .1-1.5.2-1.9.4-.5.2-.8.4-1.1.7-.3.3-.5.6-.7 1.1-.1.4-.3.9-.4 1.9-.1 1.3-.1 1.6-.1 4.8s0 3.5.1 4.8c.1 1 .2 1.5.4 1.9.2.5.4.8.7 1.1.3.3.6.5 1.1.7.4.1.9.3 1.9.4 1.3.1 1.6.1 4.8.1s3.5 0 4.8-.1c1-.1 1.5-.2 1.9-.4.5-.2.8-.4 1.1-.7.3-.3.5-.6.7-1.1.1-.4.3-.9.4-1.9.1-1.3.1-1.6.1-4.8s0-3.5-.1-4.8c-.1-1-.2-1.5-.4-1.9-.2-.5-.4-.8-.7-1.1-.3-.3-.6-.5-1.1-.7-.4-.1-.9-.3-1.9-.4-1.3-.1-1.6-.1-4.8-.1zm0 3.1a5 5 0 1 1 0 10 5 5 0 0 1 0-10zm0 1.8a3.2 3.2 0 1 0 0 6.4 3.2 3.2 0 0 0 0-6.4zm5.2-2a1.2 1.2 0 1 1 0 2.4 1.2 1.2 0 0 1 0-2.4z"/></svg>
        <span>
          <span class="label">Instagram</span>
          <span class="sub">@gabriel.ariaji</span>

    </div>

    <footer>SCAN &middot; VERIFIED &middot; 2026</footer>
  </div>

</body>
</html>
